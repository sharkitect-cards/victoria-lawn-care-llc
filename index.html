<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Victoria Lawn Care LLC</title>
    <meta name="description" content="Victoria Lawn Care LLC - Lawn Care, Kansas City Metro.">

    <!-- PWA / Home Screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="My Card">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1A1A1A">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="icon" href="logo.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #3EA86B;
            --accent-rgb: 62, 168, 107;
            --bg: #1A1A1A;
            --text-primary: #FFFFFF;
            --text-secondary: #C7CCD4;
            --text-muted: #808285;
        }

        body {
            font-family: 'Montserrat', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(var(--accent-rgb), 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(var(--accent-rgb), 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            max-width: 420px;
            width: 100%;
            background: linear-gradient(180deg, #222222 0%, var(--bg) 100%);
            border: 1px solid rgba(var(--accent-rgb), 0.15);
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
            box-shadow:
                0 0 40px rgba(var(--accent-rgb), 0.06),
                0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 2px;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            border-radius: 12px;
            overflow: hidden;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: var(--text-primary);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .title {
            font-weight: 400;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 0 auto 20px;
        }

        .tagline {
            font-family: 'Orbitron', sans-serif;
            font-weight: 500;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .bio {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
            font-weight: 300;
            margin-bottom: 28px;
            padding: 0 8px;
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .contact-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: rgba(var(--accent-rgb), 0.06);
            border: 1px solid rgba(var(--accent-rgb), 0.1);
            border-radius: 8px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: all 0.2s ease;
        }

        .contact-link:hover {
            background: rgba(var(--accent-rgb), 0.12);
            border-color: rgba(var(--accent-rgb), 0.25);
        }

        .contact-link svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            fill: var(--accent);
        }

        .contact-link span {
            color: var(--text-secondary);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .save-btn, .qr-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
            justify-content: center;
        }

        .save-btn {
            flex: 1;
            background: var(--accent);
            color: var(--text-primary);
            text-decoration: none;
        }

        .save-btn:hover {
            filter: brightness(0.85);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(var(--accent-rgb), 0.3);
        }

        .qr-btn {
            background: rgba(var(--accent-rgb), 0.1);
            color: var(--accent);
            border: 1px solid rgba(var(--accent-rgb), 0.2);
            padding: 14px 18px;
        }

        .qr-btn:hover {
            background: rgba(var(--accent-rgb), 0.18);
            transform: translateY(-1px);
        }

        .save-btn:active, .qr-btn:active { transform: translateY(0); }
        .save-btn svg { width: 18px; height: 18px; fill: var(--text-primary); }
        .qr-btn svg { width: 18px; height: 18px; fill: var(--accent); }

        .qr-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .qr-overlay.active { display: flex; }

        .qr-modal {
            background: var(--bg);
            border: 1px solid rgba(var(--accent-rgb), 0.2);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            max-width: 320px;
            width: 100%;
        }

        .qr-modal h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .qr-modal p { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
        .qr-modal svg { width: 200px; height: 200px; margin: 0 auto 20px; display: block; }

        .qr-close {
            background: none;
            border: 1px solid rgba(var(--accent-rgb), 0.2);
            color: var(--text-secondary);
            padding: 10px 24px;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .qr-close:hover { border-color: var(--accent); color: var(--text-primary); }

        .footer { font-size: 11px; color: var(--text-muted); }

        @media (max-width: 480px) {
            .card { padding: 32px 24px; }
            .name { font-size: 20px; }
            .tagline { font-size: 10px; }
            .btn-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="logo.jpg" alt="Victoria Lawn Care LLC">
        </div>

        <div class="name">Victoria Lawn Care LLC</div>

        <div class="divider"></div>

        <div class="tagline">Your Yard Done Right The First Time</div>

        <div class="bio">Lawn Mowing &bull; Edging &amp; Trimming &bull; Yard Cleanup &bull; Professional Service<br>Kansas City Metro</div>

        <div class="contact-links">
            <a href="tel:+18165203776" class="contact-link">
                <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                <span>(816) 520-3776</span>
            </a>
            <a href="tel:+19134475828" class="contact-link">
                <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                <span>(913) 447-5828</span>
            </a>
        </div>

        <div class="btn-row">
            <a class="save-btn" href="contact.vcf">
                <svg viewBox="0 0 24 24"><path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2v9.67z"/></svg>
                Save Contact
            </a>
            <button class="qr-btn" onclick="toggleQR()">
                <svg viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zm8-2v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zm13-2h-2v3h-3v2h3v3h2v-3h3v-2h-3v-3zm-3 8v-2h-2v2h2zm4 0v-2h-2v2h2z"/></svg>
                QR
            </button>
        </div>

        <div class="footer">Powered by <a href="https://www.sharkitectdigital.com" target="_blank" rel="noopener" style="color:#3EA86B;text-decoration:none;">Sharkitect</a></div>
    </div>

    <!-- QR Code Overlay -->
    <div class="qr-overlay" id="qrOverlay" onclick="toggleQR()">
        <div class="qr-modal" onclick="event.stopPropagation()">
            <h3>SCAN TO CONNECT</h3>
            <p>Point your camera at the code</p>
            <img src="qr-code.svg" alt="QR code" style="width:220px;height:220px;display:block;margin:0 auto 20px;border-radius:8px;"/>
            <button class="qr-close" onclick="toggleQR()">Close</button>
        </div>
    </div>

    <script>
        function toggleQR() {
            document.getElementById('qrOverlay').classList.toggle('active');
        }
        </script>
</body>
</html>
